<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sasi | Background</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="journey">
  <main class="page-fade">
    <section class="background-panel">
      <div class="background-header">
        <span class="eyebrow">Background</span>
        <h1>Journey and Experience</h1>
        <p><!-- Sasi: add a short summary of your background here --></p>
      </div>

      <div class="section-block">
        <h2>Education</h2>
        <div class="section-content">
          <p><!-- Sasi: add education details here --></p>
        </div>
      </div>

      <div class="section-block">
        <h2>Interests &amp; Hobbies</h2>
        <div class="pill-grid">
          <!-- Sasi: add interests and hobbies here -->
        </div>
      </div>

      <div class="section-block">
        <h2>Journey So Far</h2>
        <div class="timeline">
          <article class="timeline-item">
            <h3><!-- Sasi: add journey and achievements here --></h3>
            <p></p>
          </article>
        </div>
      </div>

      <div class="section-block">
        <h2>Blogs</h2>
        <ul class="card-list">
          <li><!-- Sasi: add blog links/titles here --></li>
        </ul>
      </div>

      <div class="section-block">
        <h2>Skills</h2>
        <ul class="skill-list">
          <li><!-- Sasi: add skills here --></li>
        </ul>
      </div>

      <div class="section-footer">
        <button id="back-start-button" class="btn btn-primary">Back to Start</button>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
